name: Deploy plugin to WordPress.org

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      WPORG_PLUGIN_SLUG: ${{ vars.WPORG_PLUGIN_SLUG }}
      WPORG_USERNAME: ${{ secrets.WPORG_USERNAME }}
      WPORG_PASSWORD: ${{ secrets.WPORG_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build release zip
        run: yarn zip:prod

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${WPORG_PLUGIN_SLUG}" ]]; then
            echo "Missing repository variable: WPORG_PLUGIN_SLUG"
            exit 1
          fi

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION="$(grep -E '^[[:space:]]*\* Version:' smooth-music-gallery.php | sed -E 's/.*Version:[[:space:]]*//')"
          STABLE_TAG="$(grep -E '^Stable tag:' readme.txt | sed -E 's/^Stable tag:[[:space:]]*//')"
          PACKAGE_VERSION="$(grep -E '"version"' package.json | head -n 1 | sed -E 's/.*"version":[[:space:]]*"([^"]+)".*/\1/')"

          if [[ "${PLUGIN_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "Plugin header version (${PLUGIN_VERSION}) must match git tag (${TAG_VERSION})."
            exit 1
          fi

          if [[ "${STABLE_TAG}" != "${TAG_VERSION}" ]]; then
            echo "Stable tag (${STABLE_TAG}) must match git tag (${TAG_VERSION})."
            exit 1
          fi

          if [[ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "package.json version (${PACKAGE_VERSION}) should match git tag (${TAG_VERSION})."
            exit 1
          fi

      - name: Extract release zip
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ZIP_PATH="zips/smooth-music-gallery-${TAG_VERSION}.zip"

          if [[ ! -f "${ZIP_PATH}" ]]; then
            echo "Expected release zip not found: ${ZIP_PATH}"
            exit 1
          fi

          mkdir -p release
          unzip -q "${ZIP_PATH}" -d release

      - name: Install Subversion
        run: sudo apt-get update && sudo apt-get install -y subversion rsync

      - name: Prepare SVN working copy
        shell: bash
        run: |
          set -euo pipefail

          svn checkout --depth immediates "https://plugins.svn.wordpress.org/${WPORG_PLUGIN_SLUG}" svn
          svn update --set-depth infinity svn/trunk

      - name: Ensure release tag does not already exist in SVN
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if svn ls "https://plugins.svn.wordpress.org/${WPORG_PLUGIN_SLUG}/tags/${TAG_VERSION}" >/dev/null 2>&1; then
            echo "SVN tag ${TAG_VERSION} already exists. Stopping deploy to avoid overwriting a published release."
            exit 1
          fi

      - name: Sync plugin to SVN trunk
        shell: bash
        run: |
          set -euo pipefail

          rsync -rc --delete release/smooth-music-gallery/ svn/trunk/

          svn status svn | awk '/^!/ {print $2}' | xargs -r svn delete
          svn status svn | awk '/^\?/ {print $2}' | xargs -r svn add --force

      - name: Create SVN tag
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          svn copy svn/trunk "svn/tags/${TAG_VERSION}"

      - name: Commit to WordPress.org SVN
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"

          svn commit svn \
            --username "${WPORG_USERNAME}" \
            --password "${WPORG_PASSWORD}" \
            --non-interactive \
            --message "Release ${TAG_VERSION}"
